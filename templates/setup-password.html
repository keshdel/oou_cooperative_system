{% extends "base.html" %}

{% block title %}Set Up Password - OOU Cooperative{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-key"></i> Set Up Your Password</h5>
                </div>
                <div class="card-body">
                    <p class="text-muted">
                        Account: <strong>{{ user.full_name or user.username }}</strong>
                    </p>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control" name="new_password" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control" name="confirm_password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-check"></i> Set Password
                        </button>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <a href="{{ url_for('auth.login') }}" class="text-muted">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
