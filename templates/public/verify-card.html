<!DOCTYPE html>
<html>
<head>
    <title>Member Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0"><i class="fas fa-check-circle"></i> Member Verification</h4>
                    </div>
                    <div class="card-body text-center">
                        <i class="fas fa-id-card fa-4x text-primary mb-3"></i>
                        <h3>{{ member.first_name }} {{ member.last_name }}</h3>
                        <p class="text-muted">Member #: {{ member.member_number }}</p>
                        <p>Status: <span class="badge bg-success">Active Member</span></p>
                        <hr>
                        <p class="small text-muted">This card is valid for cooperative services.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
