<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Expired</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="text-center" style="max-width:480px;padding:2rem;">
        <div class="text-danger mb-3" style="font-size:4rem;">
            <i class="fas fa-lock"></i>
        </div>
        <h2 class="fw-bold mb-2">Subscription Expired</h2>
        <p class="text-muted mb-4">
            Access to this cooperative management system has been suspended
            because the subscription has expired or is inactive.
        </p>
        <p class="text-muted small">
            Please contact your system administrator to renew the subscription.
        </p>
        <hr>
        <p class="text-muted small mb-0">
            &copy; {{ now().year if now is defined else '' }} Cooperative Management System
        </p>
    </div>
</div>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>
